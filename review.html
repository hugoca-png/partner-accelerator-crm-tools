<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Review partners</title>
    <style>
      :root {
        --navy: #1e2761;
        --teal: #028090;
        --gold: #d4af37;
        --ink: #111827;
        --muted: #6b7280;
        --line: #dfe5ee;
        --paper: #f5f7fb;
        --panel: #ffffff;
        --danger: #b91c1c;
        --danger-bg: #fee2e2;
        --ok: #12743b;
        --ok-bg: #e9f8ef;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 5;
        border-bottom: 4px solid var(--gold);
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(12px);
      }

      .bar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 14px 0;
      }

      h1 {
        margin: 0;
        color: var(--navy);
        font-size: 26px;
        letter-spacing: 0;
      }

      .top-actions {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
      }

      a, button {
        color: var(--teal);
        font: inherit;
        font-weight: 750;
      }

      button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        cursor: pointer;
        padding: 0 11px;
      }

      button.danger {
        border-color: #fecaca;
        background: #ffffff;
        color: var(--danger);
      }

      .delete-box {
        display: grid;
        gap: 8px;
        min-width: 190px;
        justify-items: end;
      }

      .delete-warning {
        color: var(--danger);
        font-size: 12px;
        font-weight: 800;
        line-height: 1.25;
        text-align: right;
      }

      .delete-confirm {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .delete-confirm input {
        accent-color: var(--danger);
      }

      .person-delete {
        display: grid;
        gap: 6px;
        justify-items: end;
      }

      .person-delete .delete-warning {
        font-size: 11px;
      }

      .person-delete button {
        min-height: 30px;
        padding: 0 9px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      main {
        width: min(1280px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 18px 0 48px;
      }

      .review-layout {
        display: grid;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .review-content {
        min-width: 0;
      }

      .toolbar {
        position: sticky;
        top: 73px;
        z-index: 4;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid var(--line);
        background: var(--paper);
        padding: 12px 0;
      }

      .filters {
        position: sticky;
        top: 92px;
        z-index: 3;
        display: grid;
        gap: 10px;
        max-height: calc(100vh - 110px);
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        padding: 10px;
      }

      fieldset {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px;
      }

      legend {
        padding: 0 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
      }

      .chips,
      .chip-group {
        display: grid;
        gap: 7px;
      }

      .chip-group-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        border: 0;
        background: transparent;
        padding: 4px 0;
        color: var(--navy);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .chip-group-title::after {
        content: "-";
        color: var(--muted);
      }

      .chip-group-title.collapsed::after {
        content: "+";
      }

      .chip-group[hidden] {
        display: none;
      }

      .filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        width: 100%;
        min-height: 28px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fbfcfd;
        padding: 0 9px;
        color: #2f3b43;
        font-size: 12px;
        font-weight: 720;
      }

      .filter-chip input {
        accent-color: var(--teal);
      }

      .filter-chip span {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      input[type="search"] {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        padding: 0 12px;
        color: var(--ink);
        font: inherit;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .stat {
        border-radius: 8px;
        background: #eef0fb;
        color: var(--navy);
        padding: 7px 9px;
        font-size: 13px;
        font-weight: 780;
        white-space: nowrap;
      }

      .note {
        display: none;
        margin: 12px 0 0;
        border-left: 4px solid var(--gold);
        border-radius: 6px;
        background: #fff6dc;
        color: #6f5208;
        padding: 9px 11px;
        font-size: 13px;
        font-weight: 750;
      }

      .note.visible { display: block; }

      .orgs {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .org {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 12px 28px rgba(30, 39, 97, 0.07);
        overflow: hidden;
      }

      .org-head {
        display: grid;
        grid-template-columns: 58px 1fr auto;
        gap: 14px;
        align-items: start;
        border-bottom: 1px solid var(--line);
        padding: 14px;
        background: linear-gradient(90deg, #ffffff 0%, #f4fbfc 100%);
      }

      .logo {
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #edf2f5;
        color: var(--muted);
        object-fit: contain;
        font-weight: 850;
      }

      h2 {
        margin: 0;
        color: var(--navy);
        font-size: 18px;
        letter-spacing: 0;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 7px 12px;
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
      }

      .description {
        margin: 10px 14px 0;
        color: #28323b;
        font-size: 14px;
        line-height: 1.45;
      }

      .description.empty {
        color: var(--muted);
        font-style: italic;
      }

      .people {
        display: grid;
        margin: 12px 0 0 72px;
        border-left: 4px solid var(--teal);
        background: #f9fbfd;
      }

      .person {
        display: grid;
        grid-template-columns: minmax(160px, 1fr) minmax(220px, 1.2fr) minmax(140px, 0.75fr) minmax(120px, auto);
        gap: 10px;
        align-items: start;
        border-top: 1px solid #edf1f4;
        padding: 10px 14px;
        font-size: 13px;
      }

      .person:first-child { border-top: 0; }

      .name {
        color: var(--navy);
        font-weight: 800;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 7px;
      }

      .pill {
        border-radius: 999px;
        background: #e7f6f7;
        color: var(--teal);
        padding: 3px 7px;
        font-size: 11px;
        font-weight: 800;
      }

      .pill.warn {
        background: var(--danger-bg);
        color: var(--danger);
      }

      .empty-list {
        padding: 18px;
        color: var(--muted);
      }

      @media (max-width: 760px) {
        .bar,
        .toolbar,
        .org-head,
        .person {
          grid-template-columns: 1fr;
        }

        .review-layout {
          grid-template-columns: minmax(145px, 28vw) minmax(0, 1fr);
          gap: 10px;
        }

        .filters {
          top: 92px;
          max-height: calc(100vh - 110px);
          padding: 8px;
        }

        .top-actions,
        .stats {
          justify-content: stretch;
        }

        .people {
          margin-left: 14px;
        }

        button {
          width: 100%;
        }

        .delete-box {
          justify-items: stretch;
        }

        .delete-warning {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <div>
          <h1>Review partners</h1>
          <div class="meta" id="timestamp"></div>
        </div>
        <div class="top-actions">
          <a href="/">Lista principal</a>
          <button id="refresh" type="button">Atualizar dados</button>
        </div>
      </div>
    </header>

    <main>
      <div class="review-layout">
        <aside class="filters" aria-label="Filtros">
          <fieldset>
            <legend>Regiões</legend>
            <div class="chips" id="regionFilters"></div>
          </fieldset>
          <fieldset>
            <legend>Tags</legend>
            <div class="chips" id="tagFilters"></div>
          </fieldset>
          <fieldset>
            <legend>Data-tags</legend>
            <div class="chips" id="dataTagFilters"></div>
          </fieldset>
        </aside>
        <section class="review-content" aria-label="Empresas">
          <div class="toolbar">
            <input id="search" type="search" placeholder="Filtrar por empresa, descrição, cidade, país, pessoa, email ou telefone" />
            <div class="stats" id="stats"></div>
          </div>
          <div class="note" id="note"></div>
          <section class="orgs" id="orgs"></section>
        </section>
      </div>
    </main>

    <script>
      let dataset = null;
      let visible = [];

      const el = {
        timestamp: document.getElementById("timestamp"),
        refresh: document.getElementById("refresh"),
        search: document.getElementById("search"),
        stats: document.getElementById("stats"),
        note: document.getElementById("note"),
        regionFilters: document.getElementById("regionFilters"),
        tagFilters: document.getElementById("tagFilters"),
        dataTagFilters: document.getElementById("dataTagFilters"),
        orgs: document.getElementById("orgs"),
      };

      const collapsedRegionGroups = new Set();

      function text(value) {
        return String(value || "");
      }

      function escapeHtml(value) {
        return text(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      function initials(name) {
        return text(name).trim().slice(0, 2).toUpperCase() || "?";
      }

      function setNote(message = "") {
        el.note.textContent = message;
        el.note.classList.toggle("visible", Boolean(message));
      }

      async function fetchJson(path, options = {}) {
        const response = await fetch(path, {
          cache: "no-store",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const body = await response.json();
        if (!response.ok || body.error) throw new Error(body.error || "Erro ao chamar o servidor local.");
        return body;
      }

      function normalizeRegionText(value) {
        return text(value)
          .toLocaleLowerCase("pt-PT")
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^\p{L}\p{N}]+/gu, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      const portugalRegions = [
        { name: "Norte", cities: ["amarante", "barcelos", "braga", "braganca", "ermesinde", "esposende", "famalicao", "felgueiras", "gondomar", "guimaraes", "maia", "matosinhos", "pacos de ferreira", "porto", "povoa de varzim", "santa maria da feira", "senhora da hora", "santo tirso", "sao joao da madeira", "sao mamede de infesta", "trofa", "valongo", "viana do castelo", "vila do conde", "vila nova de famalicao", "vila nova de gaia", "vila real", "viseu norte"] },
        { name: "Centro", cities: ["agueda", "anreade", "aveiro", "castelo branco", "coimbra", "covilha", "figueira da foz", "fundao", "guarda", "ilhavo", "leiria", "marinha grande", "mealhada", "oliveira de azemeis", "ovar", "pombal", "seia", "vagos", "viseu"] },
        { name: "Lisboa e Vale do Tejo", cities: ["alcobaca", "alenquer", "almada", "almeirim", "alverca", "amadora", "arruda dos vinhos", "azambuja", "barreiro", "benavente", "bombarral", "cadaval", "caldas da rainha", "caparica", "carnaxide", "cartaxo", "cascais", "chamusca", "constancia", "coruche", "entroncamento", "golega", "lisbon", "lisboa", "lousa", "loures", "lourinha", "mafra", "moita", "montijo", "nazare", "obidos", "odivelas", "oeiras", "palmela", "peniche", "pinhal novo", "rio maior", "salvaterra de magos", "santarem", "seixal", "sesimbra", "setubal", "sintra", "sobral de monte agraco", "torres novas", "torres vedras", "vila franca de xira", "vila nova da barquinha"] },
        { name: "Alentejo", cities: ["evora", "beja", "portalegre", "sines", "elvas", "estremoz", "montemor o novo", "grandola"] },
        { name: "Algarve", cities: ["faro", "portimao", "lagos", "albufeira", "loule", "tavira", "olhao"] },
        { name: "Açores", cities: ["ponta delgada", "angra do heroismo", "horta", "acores"] },
        { name: "Madeira", cities: ["funchal", "madeira"] },
      ];

      function regionForOrg(org) {
        const cityWithAccents = text(org.city).toLocaleLowerCase("pt-PT").normalize("NFC").trim();
        const country = normalizeRegionText(org.country);
        const city = normalizeRegionText(org.city);
        const orgIdentity = normalizeRegionText([org.name, org.url, ...(org.domains || [])].join(" "));
        if (orgIdentity.includes("bconcepts") || orgIdentity.includes("bconcepts pt")) return "Lisboa e Vale do Tejo";
        if (orgIdentity.includes("comudel")) return "Centro";
        if (cityWithAccents === "lousã") return "Centro";
        if (!country && !city) return "Sem país";
        const portugalAliases = ["portugal", "pt", "portuguese republic"];
        if (country && !portugalAliases.includes(country)) return org.country || "Outro país";
        if (!country && city === "lisbon") return "Lisboa e Vale do Tejo";
        for (const region of portugalRegions) {
          if (region.cities.some((item) => city === item || city.includes(item))) return region.name;
        }
        return "Portugal sem região";
      }

      function selected(container) {
        return [...container.querySelectorAll("input:checked")].map((input) => input.value);
      }

      function matchesSelected(values, selectedValues) {
        if (!selectedValues.length) return true;
        const valueSet = new Set((values || []).filter(Boolean));
        return selectedValues.some((value) => valueSet.has(value));
      }

      function visibleTag(value) {
        return !["Email Deliverable", "Email Risky", "Email Catch-All"].includes(value);
      }

      function countValues(orgs, getter) {
        const counts = new Map();
        for (const org of orgs) {
          for (const value of getter(org)) {
            if (!visibleTag(value)) continue;
            counts.set(value, (counts.get(value) || 0) + 1);
          }
        }
        return counts;
      }

      function renderFilter(container, values, counts = new Map()) {
        if (!values.length) {
          container.innerHTML = `<span class="meta">Sem valores.</span>`;
          return;
        }
        const checked = new Set(selected(container));
        container.innerHTML = values.map((value) => `
          <label class="filter-chip">
            <input type="checkbox" value="${escapeHtml(value)}" ${checked.has(value) ? "checked" : ""} />
            <span>${escapeHtml(value)}</span>
            <span>${counts.get(value) || 0}</span>
          </label>
        `).join("");
        container.querySelectorAll("input").forEach((input) => input.addEventListener("change", render));
      }

      function renderRegionFilters(orgs) {
        const selectedRegions = new Set(selected(el.regionFilters));
        const counts = new Map();
        for (const org of orgs) {
          const region = regionForOrg(org);
          counts.set(region, (counts.get(region) || 0) + 1);
        }
        const preferred = ["Norte", "Centro", "Lisboa e Vale do Tejo", "Alentejo", "Algarve", "Açores", "Madeira"];
        const portugal = preferred.filter((region) => counts.has(region));
        const other = [...counts.keys()].filter((region) => !preferred.includes(region)).sort((a, b) => a.localeCompare(b, "pt-PT"));
        const total = (items) => items.reduce((sum, region) => sum + (counts.get(region) || 0), 0);
        const renderRegion = (region) => `
          <label class="filter-chip">
            <input type="checkbox" value="${escapeHtml(region)}" ${selectedRegions.has(region) ? "checked" : ""} />
            <span>${escapeHtml(region)} (${counts.get(region)})</span>
          </label>
        `;
        const renderGroup = (id, title, items) => {
          if (!items.length) return "";
          const collapsed = collapsedRegionGroups.has(id);
          return `
            <button class="chip-group-title ${collapsed ? "collapsed" : ""}" type="button" data-region-group="${escapeHtml(id)}">
              <span>${escapeHtml(title)}</span>
              <span>${total(items)}</span>
            </button>
            <div class="chip-group" ${collapsed ? "hidden" : ""}>
              ${items.map(renderRegion).join("")}
            </div>
          `;
        };
        el.regionFilters.innerHTML = [
          renderGroup("portugal", "Portugal", portugal),
          renderGroup("other", "Outros países", other),
        ].join("") || `<span class="meta">Sem regiões.</span>`;
        el.regionFilters.querySelectorAll("[data-region-group]").forEach((button) => {
          button.addEventListener("click", () => {
            const group = button.dataset.regionGroup;
            if (collapsedRegionGroups.has(group)) collapsedRegionGroups.delete(group);
            else collapsedRegionGroups.add(group);
            render();
          });
        });
        el.regionFilters.querySelectorAll("input").forEach((input) => input.addEventListener("change", render));
      }

      function searchable(org) {
        return [
          org.name,
          org.description,
          org.city,
          org.country,
          org.url,
          ...(org.emails || []),
          ...(org.tags || []),
          ...(org.dataTags || []),
          ...(org.contacts || []).flatMap((person) => [
            person.name,
            ...(person.emails || []),
            ...(person.phones || []),
            ...(person.jobTitles || []),
            ...(person.tags || []),
            ...(person.dataTags || []),
          ]),
        ].join(" ").toLocaleLowerCase("pt-PT");
      }

      function pill(value, warn = false) {
        return value ? `<span class="pill ${warn ? "warn" : ""}">${escapeHtml(value)}</span>` : "";
      }

      function renderPerson(person) {
        const ids = (person.ids || []).map(String).filter(Boolean);
        const key = ids.join("-") || text(person.name);
        return `
          <div class="person" data-person-row="${escapeHtml(key)}">
            <div>
              <div class="name">${escapeHtml(person.name || "(sem nome)")}</div>
              <div class="meta">${escapeHtml((person.jobTitles || []).join(", "))}</div>
            </div>
            <div>${(person.emails || []).map((email) => `<a href="mailto:${escapeHtml(email)}">${escapeHtml(email)}</a>`).join("<br>")}</div>
            <div>${(person.phones || []).map((phone) => `<a href="tel:${escapeHtml(phone)}">${escapeHtml(phone)}</a>`).join("<br>")}</div>
            <div class="person-delete">
              <div class="delete-warning">Apaga apenas esta pessoa no CRM.</div>
              <label class="delete-confirm">
                <input type="checkbox" data-confirm-person-delete="${escapeHtml(key)}" />
                <span>Confirmo</span>
              </label>
              <button class="danger" type="button" data-delete-person="${escapeHtml(key)}" disabled>Apagar</button>
            </div>
          </div>
        `;
      }

      function renderOrg(org) {
        const logo = org.logo
          ? `<img class="logo" src="${escapeHtml(org.logo)}" alt="" loading="lazy" />`
          : `<div class="logo">${escapeHtml(initials(org.name))}</div>`;
        const location = [org.city, org.country].filter(Boolean).join(", ");
        const orgEmails = (org.emails || []).map((email) => `<a href="mailto:${escapeHtml(email)}">${escapeHtml(email)}</a>`).join(", ");
        const tagLine = [
          ...(org.tags || []).map((item) => pill(item)),
          ...(org.dataTags || []).map((item) => pill(item)),
          ...(org.qualityFlags || []).map((item) => pill(item, true)),
        ].join("");
        return `
          <article class="org" id="org-${escapeHtml(org.id)}">
            <div class="org-head">
              ${logo}
              <div>
                <h2>${escapeHtml(org.name)}</h2>
                <div class="meta">
                  ${location ? `<span>${escapeHtml(location)}</span>` : ""}
                  ${org.url ? `<a href="${escapeHtml(org.url)}" target="_blank" rel="noreferrer">${escapeHtml(org.url)}</a>` : ""}
                  ${orgEmails ? `<span>${orgEmails}</span>` : ""}
                  <span>${(org.contacts || []).length} pessoas</span>
                </div>
                ${tagLine ? `<div class="tags">${tagLine}</div>` : ""}
              </div>
              <div class="delete-box">
                <div class="delete-warning">Apaga a empresa e as pessoas associadas no CRM.</div>
                <label class="delete-confirm">
                  <input type="checkbox" data-confirm-delete="${escapeHtml(org.id)}" />
                  <span>Confirmo</span>
                </label>
                <button class="danger" type="button" data-delete-org="${escapeHtml(org.id)}" disabled>Apagar</button>
              </div>
            </div>
            <p class="description ${org.description ? "" : "empty"}">${escapeHtml(org.description || "Sem descrição registada.")}</p>
            <div class="people">
              ${(org.contacts || []).length ? org.contacts.map(renderPerson).join("") : `<div class="empty-list">Sem pessoas associadas.</div>`}
            </div>
          </article>
        `;
      }

      function render() {
        const query = el.search.value.trim().toLocaleLowerCase("pt-PT");
        const organisations = dataset?.organisations || [];
        const searchBase = organisations.filter((org) => !query || searchable(org).includes(query));
        const regionValues = selected(el.regionFilters);
        const tagValues = selected(el.tagFilters);
        const dataTagValues = selected(el.dataTagFilters);
        renderRegionFilters(searchBase);
        renderFilter(el.tagFilters, (dataset?.allTags || []).filter(visibleTag), countValues(searchBase, (org) => org.filterTags || org.tags || []));
        renderFilter(el.dataTagFilters, dataset?.allDataTags || [], countValues(searchBase, (org) => org.filterDataTags || org.dataTags || []));
        el.regionFilters.querySelectorAll("input").forEach((input) => { input.checked = regionValues.includes(input.value); });
        el.tagFilters.querySelectorAll("input").forEach((input) => { input.checked = tagValues.includes(input.value); });
        el.dataTagFilters.querySelectorAll("input").forEach((input) => { input.checked = dataTagValues.includes(input.value); });
        visible = searchBase.filter((org) =>
          matchesSelected([regionForOrg(org)], regionValues) &&
          matchesSelected(org.filterTags || org.tags || [], tagValues) &&
          matchesSelected(org.filterDataTags || org.dataTags || [], dataTagValues)
        );
        const people = visible.reduce((sum, org) => sum + (org.contacts || []).length, 0);
        el.stats.innerHTML = [
          `<span class="stat">${visible.length} / ${dataset?.organisationCount || 0} empresas</span>`,
          `<span class="stat">${people} pessoas visíveis</span>`,
        ].join("");
        el.orgs.innerHTML = visible.length
          ? visible.map(renderOrg).join("")
          : `<div class="empty-list">Nenhuma empresa corresponde ao filtro.</div>`;
        el.orgs.querySelectorAll("[data-confirm-delete]").forEach((checkbox) => {
          checkbox.addEventListener("change", () => {
            const button = document.querySelector(`[data-delete-org="${CSS.escape(String(checkbox.dataset.confirmDelete))}"]`);
            if (button) button.disabled = !checkbox.checked;
          });
        });
        el.orgs.querySelectorAll("[data-delete-org]").forEach((button) => {
          button.addEventListener("click", () => deleteOrg(button.dataset.deleteOrg));
        });
        el.orgs.querySelectorAll("[data-confirm-person-delete]").forEach((checkbox) => {
          checkbox.addEventListener("change", () => {
            const button = document.querySelector(`[data-delete-person="${CSS.escape(String(checkbox.dataset.confirmPersonDelete))}"]`);
            if (button) button.disabled = !checkbox.checked;
          });
        });
        el.orgs.querySelectorAll("[data-delete-person]").forEach((button) => {
          button.addEventListener("click", () => deletePerson(button.dataset.deletePerson));
        });
      }

      async function load(refresh = false) {
        el.refresh.disabled = true;
        el.refresh.textContent = refresh ? "A atualizar..." : "A carregar...";
        try {
          setNote("");
          dataset = await fetchJson(refresh ? "/api/refresh" : "/api/data");
          el.timestamp.textContent = dataset.refreshedAt
            ? `Atualizado: ${new Date(dataset.refreshedAt).toLocaleString("pt-PT")}`
            : "";
          render();
        } catch (error) {
          setNote(`Não foi possível carregar: ${error.message || "servidor local indisponível"}.`);
        } finally {
          el.refresh.disabled = false;
          el.refresh.textContent = "Atualizar dados";
        }
      }

      async function deleteOrg(id) {
        const org = (dataset?.organisations || []).find((item) => String(item.id) === String(id));
        if (!org) return;
        const peopleCount = (org.contacts || []).reduce((sum, person) => sum + (person.ids?.length || 1), 0);
        const checkbox = document.querySelector(`[data-confirm-delete="${CSS.escape(String(id))}"]`);
        if (!checkbox?.checked) {
          setNote("Marca a checkbox de confirmação antes de apagar.");
          return;
        }
        setNote(`A apagar "${org.name}" e ${peopleCount} pessoa(s) associada(s)...`);
        const button = document.querySelector(`[data-delete-org="${CSS.escape(String(id))}"]`);
        if (button) {
          button.disabled = true;
          button.textContent = "A apagar...";
        }
        try {
          const body = await fetchJson("/api/review-delete-organisation", {
            method: "POST",
            body: JSON.stringify({ id, confirmDelete: true }),
          });
          dataset = body;
          const info = body.reviewDeletion || {};
          setNote(`Apagado: ${info.organisation?.name || org.name}; pessoas removidas: ${info.deletedPeople?.length || 0}.`);
          render();
        } catch (error) {
          setNote(`Não foi possível apagar "${org.name}": ${error.message || "erro desconhecido"}.`);
          if (button) {
            button.disabled = false;
            button.textContent = "Apagar";
          }
        }
      }

      function findPersonByKey(key) {
        for (const org of dataset?.organisations || []) {
          for (const person of org.contacts || []) {
            const ids = (person.ids || []).map(String).filter(Boolean);
            const personKey = ids.join("-") || text(person.name);
            if (personKey === key) return { org, person, ids };
          }
        }
        return null;
      }

      async function deletePerson(key) {
        const found = findPersonByKey(String(key));
        if (!found) return;
        const { org, person, ids } = found;
        const checkbox = document.querySelector(`[data-confirm-person-delete="${CSS.escape(String(key))}"]`);
        if (!checkbox?.checked) {
          setNote("Marca a checkbox de confirmação antes de apagar a pessoa.");
          return;
        }
        if (!ids.length) {
          setNote(`Não foi possível apagar "${person.name || "(sem nome)"}": falta o id da pessoa.`);
          return;
        }
        setNote(`A apagar "${person.name || "(sem nome)"}" de "${org.name}"...`);
        const button = document.querySelector(`[data-delete-person="${CSS.escape(String(key))}"]`);
        if (button) {
          button.disabled = true;
          button.textContent = "A apagar...";
        }
        try {
          const body = await fetchJson("/api/review-delete-person", {
            method: "POST",
            body: JSON.stringify({ ids, confirmDelete: true }),
          });
          dataset = body;
          const info = body.reviewPersonDeletion || {};
          setNote(`Pessoa apagada: ${info.person?.name || person.name}; registos removidos: ${info.deletedPeople?.length || 0}.`);
          render();
        } catch (error) {
          setNote(`Não foi possível apagar "${person.name || "(sem nome)"}": ${error.message || "erro desconhecido"}.`);
          if (button) {
            button.disabled = false;
            button.textContent = "Apagar";
          }
        }
      }

      el.refresh.addEventListener("click", () => load(true));
      el.search.addEventListener("input", render);
      load(false);
    </script>
  </body>
</html>
